- title: "Bugler"
  abbreviation: "Bugler"
  slug: "bugler"
  description: "The bugler plays the bugle (or similar instrument) to mark key moments during the troop meeting, such as assembly, or on troop outings, such as reveille, mess call, and lights out."
  appointment: "Appointed by the senior patrol leader with Scoutmaster guidance."
  requirements:
    - "Must know the necessary bugle calls"
    - "Should possess the Bugling merit badge or be actively pursuing it"
  responsibilities:
    - "Performs appropriate bugle calls when requested at troop meetings and activities"
