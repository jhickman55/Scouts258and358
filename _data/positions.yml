- title: "Troop Guide"
  abbreviation: "TG"
  slug: "troop-guide"
  description: "Troop guides function as both leader and mentor to new-Scout patrol members. They help the patrol leader develop the new-Scout patrol into a well-functioning group, working together harmoniously and productively."
