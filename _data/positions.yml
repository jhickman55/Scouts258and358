- title: "Historian"
  abbreviation: "Historian"
  slug: "historian"
  description: "The historian collects, assembles, and preserves troop photographs, news stories, trophies, flags, scrapbooks, awards, and other memorabilia, and makes materials available for Scouting activities, courts of honor, the media, and troop history projects."
  appointment: "Appointed by the senior patrol leader with Scoutmaster guidance."
  requirements:
    - "Tech Chip for use of device connected to the Internet; or"
    - "Use of a digital camera (camera not provided by the troops)"
  responsibilities:
    - "Gathers photos and facts about troop activities and submits them via portal folder for adult approval and publishing"
    - "Takes care of troop trophies, ribbons, and souvenirs of troop activities"
    - "Keeps information about former members of the troop"
    - "Sets a good example"
    - "Wears the Scout uniform correctly"
    - "Lives by the Scout Oath and Law"
