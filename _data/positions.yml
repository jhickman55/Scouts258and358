- title: "OA Representative"
  abbreviation: "OA Rep"
  slug: "oa-representative"
  description: "Order of the Arrow representatives serve as a communication link between the troop and the local Order of the Arrow lodge. They promote the OA, encourage Scouts to take part in camping opportunities, and help pave the way for older Scouts to become involved in high-adventure programs."
  appointment: "Appointed by the senior patrol leader with Scoutmaster guidance."
  responsibilities:
    - "Attends troop, chapter, and lodge meetings regularly as a youth representative"
    - "Serves as two-way communication link between troop and lodge/chapter"
    - "Arranges with the lodge or chapter election team to conduct an annual Order of the Arrow election"
    - "Organizes lodge promotion visits to the unit annually"
    - "Delivers high adventure presentations to the troop yearly"
    - "Participates in troop courts of honor recognizing OA members and activities"
    - "Coordinates ordeal induction for newly elected candidates"
    - "Assists current ordeal members in achieving brotherhood membership"
    - "Offers training on OA principles, symbolism, and the Legend"
    - "Advocates environmental stewardship and Leave No Trace camping"
    - "Sets a good example"
    - "Wears the Scout uniform correctly"
    - "Lives by the Scout Oath and Law"
    - "Shows Scout spirit"
  resources:
    - name: "OA Unit Representative Vision and Goals"
      type: "Google Doc"
    - name: "OA Rep Checklist"
      type: "Google Drive"

- title: "Junior Assistant Scoutmaster"
  abbreviation: "Jr. ASM"
  slug: "junior-assistant-scoutmaster"
  description: "A Scout at least 16 years of age who has demonstrated exceptional leadership may be appointed by the Scoutmaster to serve as a junior assistant Scoutmaster. This role functions similarly to an assistant Scoutmaster position, except for adult-only leadership responsibilities. A troop may have multiple JASMs. Upon turning 18, they become eligible for assistant Scoutmaster appointment."
  appointment: "Appointed by the Scoutmaster."
  requirements:
    - "Minimum age: 16 years old"
    - "Outstanding leadership skills"
  responsibilities:
    - "Performs duties as assigned by the Scoutmaster"
    - "Provides support and supervision to youth leaders under the Scoutmaster's direction"
    - "Sets a good example"
    - "Wears the Scout uniform correctly"
    - "Lives by the Scout Oath and Law"
    - "Shows Scout spirit"
  resources:
    - name: "Jr. ASM Vision and Goals"
      type: "Google Doc"
