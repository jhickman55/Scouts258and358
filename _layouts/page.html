---
layout: default
---
<section class="section">
  <div class="container">
    {% if page.title %}
    <h1 class="title is-2">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="subtitle is-4">{{ page.subtitle }}</p>
    {% endif %}
    <hr>
    {% endif %}

    <div class="content">
      {{ content }}
    </div>
  </div>
</section>
