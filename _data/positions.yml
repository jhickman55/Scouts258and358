- title: "Senior Patrol Leader"
  abbreviation: "SPL"
  slug: "spl"
  description: "The senior patrol leader is the top youth leader in the troop. They lead troop meetings and activities, preside over the patrol leaders' council, and provide leadership to other youth leaders in the troop."
  appointment: "Elected by the Scouts in the troop."
  responsibilities:
    - "Leads troop meetings and activities"
    - "Presides over the patrol leaders' council"
    - "Trains and oversees youth leaders including scribe, quartermaster, librarian, historian, webmaster, chaplain aide, and OA representative"
    - "Appoints other troop youth leaders with Scoutmaster guidance"
    - "Assigns duties and responsibilities to other youth leaders"
    - "Sets a good example"
    - "Wears the Scout uniform correctly"
    - "Lives by the Scout Oath and Law"
    - "Shows Scout spirit"
