- title: "Den Chief"
  abbreviation: "DC"
  slug: "den-chief"
  description: "Den chiefs are Scouts who assist a Cub Scout den leader or Webelos den leader. They are selected by the senior patrol leader and Scoutmaster and approved by the cubmaster and the pack committee."
  appointment: "Selected by the senior patrol leader and Scoutmaster, approved by cubmaster and pack committee."
  responsibilities:
    - "Knows the purposes of Cub Scouting"
    - "Helps Cub Scouts achieve the purposes of Cub Scouting"
    - "Serves as the activities assistant at den meetings"
    - "Is a friend to the members of the den"
    - "Helps lead weekly den meetings"
    - "Helps the den in its part of the monthly pack meeting"
    - "Knows the importance of the monthly theme and pack meeting plans"
    - "Meets regularly with the den leader to review den and pack meeting plans"
    - "Meets as needed with adult members of the den, pack, and troop"
    - "Receives training from the den leader"
    - "Takes Den Chief Training"
    - "Encourages Cub Scouts to become Webelos Scouts when eligible"
    - "Encourages Webelos Scouts to join a Scout troop upon graduation"
    - "Helps the denner and assistant denner to be leaders"
    - "Sets a good example through attitude and uniforming"
    - "Wears the Scout uniform correctly"
    - "Lives by the Scout Oath and Law"
    - "Shows Scout spirit"
  resources:
    - name: "Online Den Chief Training"
      type: "External Link"
    - name: "Den Chief Service Award"
      type: "External Link"

- title: "Outdoor Ethics Guide"
  abbreviation: "OEG"
  slug: "outdoor-ethics-guide"
