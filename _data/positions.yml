- title: "Scribe"
  abbreviation: "Scribe"
  slug: "scribe"
  description: "The scribe is the troop's secretary. Though not a voting member, they attend meetings of the patrol leaders' council and keep a record of the discussions."
  appointment: "Appointed by the senior patrol leader with Scoutmaster guidance."
  responsibilities:
    - "Attends and documents patrol leaders' council meetings"
    - "Enters notes into the PLC Meeting Notes document on the shared drive"
    - "Posts meeting notes to PLC Rallyhood within one day of each meeting"
    - "Cooperates with patrol scribes to track attendance and dues at troop meetings"
    - "Maintains troop advancement records"
    - "Sets a good example"
    - "Wears the Scout uniform correctly"
    - "Lives by the Scout Oath and Law"
    - "Shows Scout spirit"
