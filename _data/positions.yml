- title: "Patrol Leader"
  abbreviation: "PL"
  slug: "patrol-leader"
  description: "The patrol leader is the patrol's key leader, representing the patrol at all patrol leaders' council meetings and the annual program planning conference, and keeping patrol members informed of decisions made."
