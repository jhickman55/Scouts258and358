---
layout: default
---
<section class="section">
  <div class="container">
    <article class="content">
      <h1 class="title is-2">{{ page.title }}</h1>
      <p class="subtitle is-6 has-text-grey">
        <i class="fas fa-calendar-alt"></i> {{ page.date | date: "%B %-d, %Y" }}
        {% if page.author %} &middot; <i class="fas fa-user"></i> {{ page.author }}{% endif %}
      </p>
      <hr>
      {{ content }}
    </article>
    <div class="mt-6">
      <a href="{{ '/activities/' | relative_url }}" class="button is-link is-outlined">
        <i class="fas fa-arrow-left mr-2"></i> Back to Activities
      </a>
    </div>
  </div>
</section>
