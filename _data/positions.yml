- title: "Quartermaster"
  abbreviation: "QM"
  slug: "quartermaster"
  description: "Quartermasters serve as the troop's supply boss. They keep an inventory of troop equipment and see that the gear is in good condition. They work with patrol quartermasters as they check out equipment and return it."
  appointment: "Appointed by the senior patrol leader with Scoutmaster guidance."
  responsibilities:
    - "Keeps records on patrol and troop equipment"
    - "Makes sure equipment is in good working condition"
    - "Issues equipment and makes sure it is returned in good condition"
    - "Makes suggestions for new or replacement items"
    - "Works with the troop committee member responsible for equipment"
    - "Sets a good example"
    - "Wears the Scout uniform correctly"
    - "Lives by the Scout Oath and Law"
    - "Shows Scout spirit"
